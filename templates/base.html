<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ t["app_title"] }}{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <main class="container py-4 py-md-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <h1 class="h3 mb-0">{{ t["app_title"] }}</h1>

          <div class="d-flex gap-2 align-items-center flex-wrap">
            {% block top_actions %}{% endblock %}

            <form method="get" action="{{ request.path }}" class="d-flex align-items-center gap-2">
              {% if request.args.get("negocio") %}
              <input type="hidden" name="negocio" value="{{ request.args.get('negocio') }}">
              {% endif %}
              <label for="lang" class="fw-semibold mb-0">{{ t["language"] }}</label>
              <select
                name="lang"
                id="lang"
                class="form-select"
                style="min-width: 180px"
                onchange="this.form.submit()"
              >
                <option value="es" {% if lang == 'es' %}selected{% endif %}>Español</option>
                <option value="en" {% if lang == 'en' %}selected{% endif %}>English</option>
                <option value="id" {% if lang == 'id' %}selected{% endif %}>Bahasa Indonesia</option>
              </select>
            </form>
          </div>
        </div>

        {% block content %}{% endblock %}

      </div>
    </div>
  </main>
</body>
</html>
