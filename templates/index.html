<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reporte de Ventas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h1 class="mb-3 text-center">Reporte automático de ventas</h1>
              <p class="text-muted text-center mb-4">
                Sube tu archivo Excel y obtén un resumen claro de tus ventas.
              </p>

              {% if error %}
              <div class="alert alert-danger">{{ error }}</div>
              {% endif %}

              <div class="alert alert-secondary">
                <strong>Formato requerido del Excel:</strong><br />
                fecha | producto | categoria | cantidad | precio
              </div>

              <form action="/procesar" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                  <label for="archivo" class="form-label">Archivo Excel (.xlsx o .csv)</label>
                  <input
                    class="form-control"
                    type="file"
                    id="archivo"
                    name="archivo"
                    accept=".xlsx"
                    required
                  />
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">
                    Generar reporte
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
